<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaria - Cadastro de Rotas</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { 
            background-color: #031411; 
            color: white; 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #06241e; 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid #0c4035; 
        }
        h1 { 
            color: #ffcc00; 
            text-align: center; 
            margin-top: 0; 
            font-size: 1.6rem; 
        }
        label { 
            display: block; 
            margin-top: 12px; 
            font-size: 0.9rem; 
            color: #aaa; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            background: #031411; 
            border: 1px solid #0c4035; 
            color: white; 
            border-radius: 8px; 
            margin-top: 5px; 
            box-sizing: border-box; 
        }
        textarea { 
            height: 80px; 
            resize: none; 
        }
        .btn-salvar { 
            width: 100%; 
            padding: 14px; 
            background: #ffcc00; 
            color: #031411; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 1rem; 
        }
        .btn-voltar { 
            display: block; 
            text-align: center; 
            color: #aaa; 
            margin-top: 15px; 
            text-decoration: none; 
            font-size: 0.85rem; 
        }
        .btn-voltar:hover {
            color: #ffcc00;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Painel de Controle: Secretaria</h1>
        <p style="text-align: center; font-size: 0.85rem; color: #aaa; margin-bottom: 20px;">Cadastre Cidades, Rotas e Aloque Motoristas</p>

        <form id="form-secretaria">
            <label for="sec-cidade">Cidade Sede / Polo</label>
            <input type="text" id="sec-cidade" required placeholder="Ex: Guarabira">

            <label for="sec-rota">Nome da Rota</label>
            <input type="text" id="sec-rota" required placeholder="Ex: Rota do Quartel">

            <label for="sec-itinerario">Itinerário (Pontos de Passagem)</label>
            <textarea id="sec-itinerario" required placeholder="Ex: Saída da Praça, Rua Nova, Escola X..."></textarea>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label for="sec-inicio">Horário de Início</label>
                    <input type="time" id="sec-inicio" required>
                </div>
                <div style="flex: 1;">
                    <label for="sec-chegada">Horário de Chegada</label>
                    <input type="time" id="sec-chegada" required>
                </div>
            </div>

            <label for="sec-motorista">Motorista Responsável</label>
            <select id="sec-motorista" required>
                <option value="">Carregando motoristas...</option>
            </select>

            <button type="submit" class="btn-salvar">Salvar Rota Dinâmica</button>
        </form>

       <a href="../Pagina Principal/dashboard.html" class="btn-voltar">Ir para o Dashboard</a>

    </div>

    <script src="gestao.js"></script>
</body>
</html>
