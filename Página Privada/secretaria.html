<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Ônibus na Estrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#031411] text-white min-h-screen flex items-center justify-center font-sans p-4">

    <div class="bg-[#06241e] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-[#0c4035]">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-[#ffcc00]">Painel da Secretária</h1>
            <p class="text-gray-400 text-sm mt-1">Gerador de Códigos de Ativação para Motoristas</p>
        </div>

        <form id="form-admin" class="space-y-5">
            <div>
                <label for="driver-name-admin" class="block text-sm font-medium text-gray-300 mb-2">Nome do Motorista</label>
                <input type="text" id="driver-name-admin" required 
                    class="w-full px-4 py-3 bg-[#031411] border border-[#0c4035] rounded-xl text-white focus:outline-none focus:border-[#ffcc00] transition-colors"
                    placeholder="Ex: Carlos Augusto Silva">
            </div>

            <button type="submit" 
                class="w-full py-3 bg-[#ffcc00] text-[#031411] font-bold rounded-xl hover:bg-[#e6b800] transition-colors shadow-lg shadow-yellow-900/20">
                Gerar Código de Acesso
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-[#0c4035] text-center">
            <a href="index.html" class="text-sm text-gray-400 hover:text-[#ffcc00] transition-colors">➔ Voltar para o Início</a>
        </div>
    </div>

    <script src="secretaria.js"></script>
</body>
</html>
